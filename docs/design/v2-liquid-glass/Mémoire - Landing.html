<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mémoire — Calm luxury for the curious mind</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<style>
  :root {
    --bg: #0A0A0C;
    --bg-2: #111114;
    --bg-3: #1C1C1E;
    --bg-card: #18181B;
    --fg: #F5F5F7;
    --fg-read: #F2EDE4;
    --fg-2: #A8A8B0;
    --fg-3: #6E6E75;
    --hair: rgba(255,255,255,0.06);
    --gold: #D4AF37;
    --gold-l: #E5C564;
    --gold-d: #B8942E;
    --gold-tint: rgba(212,175,55,0.14);
    --peach: #F7A58C;
    --green: #4ADE80;
    --serif: 'Source Serif 4','New York',Georgia,serif;
    --sans: 'Inter',-apple-system,system-ui,sans-serif;
    --mono: 'JetBrains Mono',ui-monospace,monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font-family: var(--sans); -webkit-font-smoothing: antialiased;

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  ::selection { background: var(--gold-tint); color: var(--gold-l); }
  .serif { font-family: var(--serif); }
  .mono { font-family: var(--mono); }
  .kicker { font-size: 11px; font-weight: 600; color: var(--gold);
    letter-spacing: 3px; text-transform: uppercase; }
  .gold-text { color: var(--gold); }
  .italic { font-style: italic; }
  img { max-width: 100%; display: block; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "ctaMode": "appstore"
}/*EDITMODE-END*/;

const GOLD = '#D4AF37', GOLD_L = '#E5C564', GOLD_D = '#B8942E';

// ═════════════════════════════════════════════════════════════
// Primitives
// ═════════════════════════════════════════════════════════════

function GoldButton({ children, onClick, type = 'button', style = {}, size = 'md' }) {
  const h = size === 'lg' ? 54 : 48;
  return (
    <button type={type} onClick={onClick} style={{
      height: h, padding: '0 24px', border: 'none', borderRadius: 12,
      background: `linear-gradient(180deg, ${GOLD_L} 0%, ${GOLD} 55%, ${GOLD_D} 100%)`,
      color: '#1A1405', fontSize: 15, fontWeight: 650, letterSpacing: 0.1, whiteSpace: 'nowrap',
      boxShadow: '0 1px 0 rgba(255,255,255,0.18) inset, 0 -1px 0 rgba(0,0,0,0.2) inset, 0 10px 30px rgba(212,175,55,0.2)',
      transition: 'transform 120ms ease',
      ...style,
    }}
      onMouseDown={(e) => e.currentTarget.style.transform = 'scale(0.985)'}
      onMouseUp={(e) => e.currentTarget.style.transform = 'scale(1)'}
      onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}
    >{children}</button>
  );
}

function GhostButton({ children, onClick, style = {} }) {
  return (
    <button onClick={onClick} style={{
      height: 48, padding: '0 22px', borderRadius: 12,
      background: 'transparent', color: 'var(--fg)',
      border: '1px solid rgba(255,255,255,0.12)',
      fontSize: 15, fontWeight: 500,
      ...style,
    }}>{children}</button>
  );
}

// App Store badge — simplified, original rendering
function AppStoreBadge({ size = 'lg' }) {
  const h = size === 'lg' ? 54 : 46;
  return (
    <button style={{
      height: h, padding: '0 22px 0 18px',
      borderRadius: 12, border: '1px solid rgba(255,255,255,0.18)',
      background: '#000', color: '#fff',
      display: 'inline-flex', alignItems: 'center', gap: 12,
      fontFamily: 'var(--sans)',
    }}>
      <svg width="22" height="26" viewBox="0 0 22 26" fill="none">
        <path d="M17.5 13.8c0-3 2.4-4.4 2.5-4.5-1.4-2-3.5-2.3-4.2-2.3-1.8-.2-3.5 1-4.4 1s-2.3-1-3.8-1c-2 0-3.8 1.1-4.8 2.8-2 3.5-.5 8.7 1.5 11.5 1 1.4 2.1 2.9 3.6 2.8 1.4-.1 2-.9 3.7-.9s2.2.9 3.8.9c1.6 0 2.5-1.4 3.5-2.8 1.1-1.6 1.5-3.2 1.5-3.3-.1 0-2.9-1.1-2.9-4.3zM14.5 4.5c.8-1 1.3-2.3 1.2-3.6-1.1.1-2.5.8-3.3 1.7-.7.9-1.4 2.2-1.2 3.5 1.3.1 2.5-.6 3.3-1.6z" fill="#fff"/>
      </svg>
      <div style={{ textAlign: 'left', lineHeight: 1.1 }}>
        <div style={{ fontSize: 10, opacity: 0.85, letterSpacing: 0.2 }}>Télécharger dans l'</div>
        <div style={{ fontSize: 19, fontWeight: 500, letterSpacing: -0.3 }}>App Store</div>
      </div>
    </button>
  );
}

// ═════════════════════════════════════════════════════════════
// Flip card (interactive demo)
// ═════════════════════════════════════════════════════════════

function FlipCard({ front, back, width = 380, height = 240 }) {
  const [flipped, setFlipped] = React.useState(false);
  return (
    <div style={{ perspective: 1400, width, height }} onClick={() => setFlipped(f => !f)}>
      <div style={{
        width: '100%', height: '100%', position: 'relative', cursor: 'pointer',
        transition: 'transform 600ms cubic-bezier(.2,.8,.2,1)',
        transform: flipped ? 'rotateY(180deg)' : 'rotateY(0deg)',
        transformStyle: 'preserve-3d',
      }}>
        <CardFace label="Question" front={true}>{front}</CardFace>
        <CardFace label="Réponse" front={false}>{back}</CardFace>
      </div>
    </div>
  );
}

function CardFace({ front, label, children }) {
  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: front ? 'linear-gradient(180deg, #323234, #262628)' : 'linear-gradient(180deg, #2C2C2E, #232325)',
      borderRadius: 20, border: '0.5px solid rgba(255,255,255,0.06)',
      boxShadow: '0 30px 60px rgba(0,0,0,0.45), inset 0 0 0 0.5px rgba(212,175,55,0.08)',
      padding: '26px 26px',
      display: 'flex', flexDirection: 'column',
      backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden',
      transform: front ? 'rotateY(0deg)' : 'rotateY(180deg)',
    }}>
      <div style={{ fontSize: 10, fontWeight: 600, color: GOLD, letterSpacing: 2.4, textTransform: 'uppercase' }}>{label}</div>
      <div style={{ height: 0.5, background: 'rgba(212,175,55,0.2)', margin: '10px 0 18px' }}/>
      <div style={{
        flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
        textAlign: 'center', fontFamily: 'var(--serif)',
        fontSize: 21, fontWeight: front ? 500 : 400, lineHeight: 1.4,
        color: 'var(--fg-read)', letterSpacing: -0.2, textWrap: 'pretty',
      }}>{children}</div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════
// Navigation

function Nav({ ctaMode, onJoin }) {
  return (

      position: 'sticky', top: 0, zIndex: 50,

          <div style={{

            display: 'grid', placeItems: 'center',

            boxShadow: '0 6px 18px rgba(212,175,55,0.25)',

          <div style={{ fontFamily: 'var(--serif)', fontSize: 20, fontWeight: 500, letterSpacing: -0.3 }}>Mémoire</div>
        </a>
        <nav style={{ display: 'flex', gap: 32, fontSize: 14, color: 'var(--fg-2)' }}>
          <a href="#how">L'app</a>
          <a href="#why">Pourquoi</a>
          <a href="#science">Science</a>
          <a href="#faq">FAQ</a>
        </nav>
        {ctaMode === 'appstore' ? (

          <GoldButton size="md" onClick={onJoin} style={{ height: 40, fontSize: 13, padding: '0 20px' }}>Rejoindre</GoldButton>

}

// ═════════════════════════════════════════════════════════════
// Hero
// ═════════════════════════════════════════════════════════════

function Hero({ ctaMode, onJoin }) {
  return (
    <section style={{ position: 'relative', overflow: 'hidden' }}>
      {/* Ambient gold glow */}
      <div style={{
        position: 'absolute', top: -200, left: '50%', transform: 'translateX(-50%)',
        width: 900, height: 700, pointerEvents: 'none',
        background: 'radial-gradient(ellipse at center, rgba(212,175,55,0.10), rgba(212,175,55,0) 60%)',
        filter: 'blur(40px)',

        position: 'absolute', inset: 0, pointerEvents: 'none', opacity: 0.3,
        backgroundImage: 'linear-gradient(to bottom, transparent 0%, transparent 99.5%, rgba(255,255,255,0.015) 100%)',

      <div style={{

        display: 'grid', gridTemplateColumns: '1.15fr 1fr', gap: 80,

      }}>
        <div>
          <div className="kicker">Bientôt sur iOS · 2026</div>

            color: 'var(--fg-read)', textWrap: 'balance',
          }}>
            Apprendre<br/>
            <span style={{ fontStyle: 'italic', color: GOLD }}>sans s'en vouloir.</span>
          </h1>
          <p className="serif" style={{
            fontSize: 20, color: 'var(--fg-2)', lineHeight: 1.55,
            maxWidth: 520, margin: '28px 0 0', letterSpacing: -0.1,
          }}>
            Mémoire est une app de répétition espacée conçue pour les adultes TDAH. Un écran, trois boutons, aucun jugement. L'algorithme FSRS fait le reste.
          </p>

          <div style={{ marginTop: 40, display: 'flex', gap: 14, flexWrap: 'wrap' }}>
            {ctaMode === 'appstore' ? (
              <>
                <AppStoreBadge size="lg"/>

              </>
            ) : (
              <>
                <GoldButton size="lg" onClick={onJoin}>Rejoindre la liste d'attente</GoldButton>

          <div style={{

            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <Dot/>Dark par défaut
            </span>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <Dot/>Offline-first

function Dot() {
  return <span style={{ width: 4, height: 4, borderRadius: 2, background: GOLD, boxShadow: `0 0 6px ${GOLD}` }}/>;
}

function HeroVisual() {
  return (
    <div style={{ position: 'relative', height: 520, display: 'grid', placeItems: 'center' }}>
      {/* Back ring card */}
      <div style={{
        position: 'absolute', width: 340, height: 440,
        transform: 'translate(-70px, -30px) rotate(-5deg)',

      }}>

        position: 'absolute', width: 300, height: 200,

        <div style={{
          width: '100%', height: '100%', borderRadius: 18,

          fontFamily: 'var(--serif)', fontSize: 15, lineHeight: 1.5,
        }}>
          <div style={{ fontSize: 9, color: GOLD, letterSpacing: 2, fontFamily: 'var(--sans)', fontWeight: 600 }}>SCORE</div>

      </div>
      {/* Front: live flip card */}
      <div style={{ transform: 'translate(0, 0)', zIndex: 2 }}>

          fontSize: 12, color: 'var(--fg-3)', letterSpacing: 0.3,
        }}>

            <span style={{

function RingSVG() {
  const r = 110, c = 2 * Math.PI * r;
  return (
    <svg width={280} height={280} viewBox="0 0 280 280">
      <circle cx="140" cy="140" r={r} stroke="rgba(255,255,255,0.06)" strokeWidth={18} fill="none"/>
      <circle cx="140" cy="140" r={r} stroke={GOLD} strokeWidth={18} strokeLinecap="round" fill="none"
        strokeDasharray={c} strokeDashoffset={c * 0.4}
        transform="rotate(-90 140 140)"
        style={{ filter: `drop-shadow(0 0 12px ${GOLD}88)` }}/>
      <text x="140" y="140" textAnchor="middle" dominantBaseline="central"
        fontFamily="Source Serif 4, serif" fontSize="80" fontWeight="500" fill="#F2EDE4" letterSpacing="-2">18</text>
      <text x="140" y="186" textAnchor="middle" fontFamily="Inter" fontSize="11" fill="#A8A8B0" letterSpacing="1.8">CARTES À RÉVISER</text>
    </svg>
  );
}

function Manifesto() {

// ═════════════════════════════════════════════════════════════
// How it works — 3 steps
// ═════════════════════════════════════════════════════════════

function HowItWorks() {
  const steps = [
    {
      n: '01',
      title: 'Créez vos cartes',
      body: 'Question, réponse, paquet. Texte brut. Zéro configuration, zéro choix de template.',
      visual: <StepCreate/>,
    },
    {
      n: '02',
      title: 'Trois boutons, rien de plus',
      body: 'Révélez la réponse, notez votre rappel : raté, moyen, facile. L\'intervalle s\'ajuste automatiquement via FSRS.',
      visual: <StepReview/>,
    },
    {
      n: '03',
      title: 'L\'algorithme vous attend',
      body: 'Chaque carte revient au moment précis où vous êtes sur le point de l\'oublier. Rien ne se perd, rien ne vous punit.',
      visual: <StepSchedule/>,
    },
  ];

  return (
    <section id="how" style={{ padding: '120px 40px 80px' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div className="kicker">Comment ça marche</div>
        <h2 className="serif" style={{
          fontSize: 'clamp(38px, 4.4vw, 54px)', fontWeight: 500,
          letterSpacing: -1, lineHeight: 1.1, margin: '18px 0 0',
          maxWidth: 720,
        }}>
          Trois gestes par jour.<br/>
          <span style={{ color: GOLD, fontStyle: 'italic', fontWeight: 400 }}>Aucune friction.</span>
        </h2>
      </div>

      <div style={{
        maxWidth: 1200, margin: '72px auto 0',
        display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24,
      }}>
        {steps.map(s => (
          <div key={s.n} style={{
            padding: 32, borderRadius: 20,
            background: 'var(--bg-card)',
            border: '0.5px solid rgba(255,255,255,0.05)',
            display: 'flex', flexDirection: 'column',
          }}>
            <div style={{ height: 180, marginBottom: 28, display: 'grid', placeItems: 'center' }}>
              {s.visual}
            </div>
            <div className="mono" style={{ fontSize: 11, color: GOLD, letterSpacing: 1.6 }}>{s.n}</div>
            <div className="serif" style={{
              fontSize: 22, fontWeight: 500, marginTop: 10,
              letterSpacing: -0.3, color: 'var(--fg-read)',
            }}>{s.title}</div>
            <div className="serif" style={{
              fontSize: 15, color: 'var(--fg-2)', marginTop: 10,
              lineHeight: 1.6, letterSpacing: -0.1,
            }}>{s.body}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function StepCreate() {
  return (
    <div style={{ width: '100%', padding: '0 10px' }}>
      {['Quelle est l\'intuition du FSRS ?', 'Que modélise D, S, R ?', '_____'].map((q, i) => (
        <div key={i} style={{
          padding: '10px 14px', marginBottom: 8, borderRadius: 10,
          background: i === 2 ? 'rgba(212,175,55,0.08)' : 'rgba(255,255,255,0.03)',
          border: i === 2 ? `0.5px dashed ${GOLD}66` : '0.5px solid rgba(255,255,255,0.04)',
          fontFamily: 'var(--serif)', fontSize: 14,
          color: i === 2 ? GOLD : 'var(--fg-2)',
          fontStyle: i === 2 ? 'italic' : 'normal',
        }}>{q}</div>
      ))}
    </div>
  );
}

function StepReview() {
  const btns = [
    { c: '#F7A58C', bg: 'rgba(247,165,140,0.08)', b: 'rgba(247,165,140,0.25)', t: 'Raté', i: '✕' },
    { c: GOLD, bg: 'rgba(212,175,55,0.12)', b: 'rgba(212,175,55,0.3)', t: 'Moyen', i: '○' },
    { c: '#4ADE80', bg: 'rgba(74,222,128,0.08)', b: 'rgba(74,222,128,0.25)', t: 'Facile', i: '✓' },
  ];
  return (
    <div style={{ display: 'flex', gap: 8, width: '100%' }}>
      {btns.map((b, i) => (
        <div key={i} style={{
          flex: 1, height: 64, borderRadius: 12,
          background: b.bg, border: `1px solid ${b.b}`, color: b.c,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          gap: 3, fontSize: 13, fontWeight: 650,
        }}>
          <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ fontSize: 11 }}>{b.i}</span>{b.t}
          </span>
        </div>
      ))}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);
  const [joined, setJoined] = React.useState(false);

  React.useEffect(() => {
    const handler = (e) => {
      const m = e.data;
      if (!m || typeof m !== 'object') return;
      if (m.type === '__activate_edit_mode') setEditMode(true);
      else if (m.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const update = (k, v) => {
    setTweaks(t => {
      const next = { ...t, [k]: v };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      return next;
    });
  };

  const scrollToCta = () => {
    document.getElementById('final-cta')?.scrollIntoView({ behavior: 'smooth' });
  };

  return (
    <>
      <Nav ctaMode={tweaks.ctaMode} onJoin={scrollToCta}/>
      <Hero ctaMode={tweaks.ctaMode} onJoin={scrollToCta}/>
      <Manifesto/>
      <HowItWorks/>
      <Principles/>
      <Comparison/>
      <Science/>
      <FAQ/>
      <div id="final-cta">
        <FinalCTA ctaMode={tweaks.ctaMode} onJoin={scrollToCta} joined={joined} setJoined={setJoined}/>
      </div>
      <Footer/>
      {editMode && <TweaksPanel tweaks={tweaks} update={update} onClose={() => setEditMode(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
